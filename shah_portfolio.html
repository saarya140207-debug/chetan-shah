<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mitul Parekh Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#E8EEF8;
  --card:#fff;
  --nav1:#08172B;
  --nav2:#0E2847;
  --acc:#1B5FCC;
  --icici:#E05800;
  --sushil:#7A28C0;
  --zerodha:#1A1A1A;
  --tbd:#C47A00;
  --gn:#065F46;
  --gnbg:#D1FAE5;
  --rd:#991B1B;
  --rdbg:#FEE2E2;
  --t1:#0B1728;
  --t2:#4A5568;
  --t3:#94A3B8;
  --bdr:#E2E8F2;
  --sh:0 1px 2px rgba(8,23,43,.05),0 6px 24px rgba(8,23,43,.07);
  --sh2:0 2px 4px rgba(8,23,43,.06),0 12px 40px rgba(8,23,43,.1);
  --r:16px;
  --ri:10px;
  --f:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ─── LOCK SCREEN ─── */
#lockScreen{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(145deg,#07121F 0%,#0E2542 55%,#091C34 100%);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;padding:24px;
}
.lock-card{
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.12);
  border-radius:24px;padding:40px 36px;
  width:100%;max-width:360px;text-align:center;
  backdrop-filter:blur(12px);
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.lock-logo{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(135deg,var(--acc),#3B82F6);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;color:#fff;
  margin:0 auto 20px;
  box-shadow:0 8px 24px rgba(27,95,204,.5);
}
.lock-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.4px;}
.lock-sub{font-size:13px;color:rgba(255,255,255,.45);margin-top:6px;font-weight:400;}
.lock-input-wrap{margin:28px 0 6px;position:relative;}
input.lock-pin{
  width:100%;background:rgba(255,255,255,.08);
  border:1.5px solid rgba(255,255,255,.15);
  color:#fff;text-align:center;
  padding:16px 48px 16px 16px;
  font-size:28px;font-weight:800;letter-spacing:8px;
  font-family:var(--f);border-radius:12px;outline:none;
  transition:border-color .15s,background .15s;
  -webkit-text-security:disc;
}
input.lock-pin::placeholder{color:rgba(255,255,255,.2);letter-spacing:2px;font-size:15px;font-weight:400;}
input.lock-pin:focus{border-color:rgba(255,255,255,.45);background:rgba(255,255,255,.12);}
input.lock-pin.err{border-color:#EF4444;animation:shake .35s ease;}
.lock-eye{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,.35);
  font-size:18px;cursor:pointer;padding:4px;
  transition:color .15s;
}
.lock-eye:hover{color:rgba(255,255,255,.7);}
.lock-btn{
  width:100%;padding:15px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#1B5FCC,#3B82F6);
  color:#fff;font-size:16px;font-weight:800;font-family:var(--f);
  cursor:pointer;margin-top:4px;
  box-shadow:0 4px 20px rgba(27,95,204,.5);
  transition:opacity .15s,transform .1s;
}
.lock-btn:hover{opacity:.9;transform:translateY(-1px);}
.lock-btn:active{transform:translateY(0);}
.lock-err{
  color:#FCA5A5;font-size:13px;font-weight:600;
  margin-top:12px;min-height:20px;
}
.lock-hint{color:rgba(255,255,255,.2);font-size:11px;margin-top:20px;}

@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-5px);}
  80%{transform:translateX(5px);}
}
@keyframes fadeOut{
  to{opacity:0;transform:scale(1.03);}
}
.lock-fadeout{animation:fadeOut .35s ease forwards;}

/* ─── NAV ─── */
.nav{
  background:linear-gradient(135deg,var(--nav1) 0%,var(--nav2) 100%);
  padding:14px 16px 0;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(0,0,0,.25);
}
.nav-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.nav-logo{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),#3B82F6);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:900;color:#fff;letter-spacing:-1px;
  box-shadow:0 2px 8px rgba(27,95,204,.5);
  cursor:pointer;user-select:none;transition:opacity .15s;
}
.nav-logo:hover{opacity:.85;}
.nav-brand{cursor:pointer;flex:1;min-width:0;}
.nav-brand:hover .nav-title{text-decoration:underline;text-underline-offset:2px;text-decoration-color:rgba(255,255,255,.4);}
.nav-title{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px;white-space:nowrap;}
.nav-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px;font-weight:400;}
.nav-actions{display:flex;gap:8px;flex-shrink:0;}
.nbtn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);
  color:#fff;padding:7px 12px;border-radius:8px;
  font-size:12px;font-weight:700;font-family:var(--f);
  cursor:pointer;white-space:nowrap;transition:background .15s;
  display:flex;align-items:center;gap:5px;
}
.nbtn:hover{background:rgba(255,255,255,.2);}
.nbtn:disabled{opacity:.4;cursor:not-allowed;}

/* ─── SEARCH ─── */
.nav-search{position:relative;padding-bottom:12px;}
.srchico{position:absolute;left:14px;top:50%;transform:translateY(-60%);color:rgba(255,255,255,.35);font-size:16px;pointer-events:none;}
input.sq{
  width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.14);
  color:#fff;padding:11px 40px 11px 42px;font-size:15px;font-family:var(--f);
  border-radius:10px;outline:none;transition:all .15s;
}
input.sq::placeholder{color:rgba(255,255,255,.32);}
input.sq:focus{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.45);}
.sqx{
  position:absolute;right:12px;top:50%;transform:translateY(-60%);
  background:rgba(255,255,255,.14);border:none;color:#fff;
  width:24px;height:24px;border-radius:50%;font-size:13px;
  cursor:pointer;display:none;align-items:center;justify-content:center;font-family:var(--f);
}
.sqx.on{display:flex;}

/* ─── TABS ─── */
.tab-bar{
  display:flex;gap:4px;padding:16px 16px 0;
  max-width:900px;margin:0 auto;
}
.tab{
  padding:9px 16px;border-radius:10px 10px 0 0;font-size:13px;font-weight:700;
  cursor:pointer;border:none;font-family:var(--f);background:rgba(255,255,255,.5);
  color:var(--t2);transition:all .15s;display:flex;align-items:center;gap:6px;
  border:1.5px solid transparent;border-bottom:none;
}
.tab:hover{background:rgba(255,255,255,.75);color:var(--t1);}
.tab.active{background:#fff;color:var(--t1);border-color:var(--bdr);}
.tab-pill{
  background:var(--bdr);color:var(--t3);font-size:10px;font-weight:800;
  padding:1px 6px;border-radius:20px;
}
.tab.active .tab-pill{background:var(--acc);color:#fff;}
.tab.spec .tab-pill{background:#F59E0B;color:#fff;}

/* ─── CONTENT ─── */
.wrap{
  background:#fff;border:1.5px solid var(--bdr);border-radius:0 var(--r) var(--r) var(--r);
  max-width:900px;margin:0 auto 20px;padding:20px 16px;
  box-shadow:var(--sh);
}
.outer{padding:0 16px 40px;max-width:900px;margin:0 auto;}

/* ─── OVERVIEW STATS ─── */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{
  border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;
  box-shadow:var(--sh);
}
.stat-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,0) 60%);
  pointer-events:none;
}
.sc-inv{background:linear-gradient(135deg,#0B1F3A,#1A3A6B);}
.sc-unreal{background:linear-gradient(135deg,#064E3B,#065F46);}
.sc-unreal.loss{background:linear-gradient(135deg,#7F1D1D,#991B1B);}
.sc-unreal.neutral{background:linear-gradient(135deg,#1E3A5F,#2B5282);}
.sc-delivery{background:linear-gradient(135deg,#1A5276,#2471A3);}
.sc-spec{background:linear-gradient(135deg,#7D3C98,#9B59B6);}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.55);margin-bottom:6px;}
.stat-val{font-size:22px;font-weight:900;color:#fff;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1.1;}
.stat-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;font-weight:500;}
.stat-loader{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.25);border-top-color:rgba(255,255,255,.8);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}

/* ─── SECTION HEAD ─── */
.sec-h{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin:0 0 10px;}

/* ─── ACCOUNT CARDS ─── */
.accts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:22px;}
.ac{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);
  padding:14px 16px;border-left:4px solid;box-shadow:var(--sh);
  cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;
  user-select:none;
}
.ac:hover{transform:translateY(-2px);box-shadow:var(--sh2);}
.ac.selected{border-color:currentColor;border-width:2px;box-shadow:0 0 0 3px currentColor,var(--sh2);transform:translateY(-2px);}
.ac-nm{font-size:14px;font-weight:800;}
.ac-pl{font-size:11px;color:var(--t3);margin-top:1px;}
.ac-am{font-size:19px;font-weight:900;letter-spacing:-.5px;margin-top:8px;font-variant-numeric:tabular-nums;color:var(--t1);}
.ac-ct{font-size:11px;color:var(--t3);margin-top:2px;}

/* ─── ACCOUNT DETAIL FILTER ─── */
.acct-filter-header{
  background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);
  padding:16px 18px;margin-bottom:16px;box-shadow:var(--sh);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.acct-filter-back{
  background:var(--bg);border:1.5px solid var(--bdr);color:var(--t2);
  padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;
  font-family:var(--f);cursor:pointer;transition:background .12s;
  display:flex;align-items:center;gap:5px;flex-shrink:0;
}
.acct-filter-back:hover{background:var(--bdr);}
.acct-filter-info{flex:1;}
.acct-filter-name{font-size:18px;font-weight:900;letter-spacing:-.3px;}
.acct-filter-sub{font-size:12px;color:var(--t3);margin-top:2px;}
.acct-filter-total{font-size:22px;font-weight:900;letter-spacing:-.5px;font-variant-numeric:tabular-nums;text-align:right;}
.acct-filter-totalsub{font-size:11px;color:var(--t3);margin-top:2px;text-align:right;}

/* ─── HOLDINGS TABLE ─── */
.tw{border-radius:var(--ri);overflow:hidden;border:1.5px solid var(--bdr);margin-bottom:20px;}
.ht{width:100%;border-collapse:collapse;font-size:13.5px;}
.ht thead th{background:#F8FAFD;padding:11px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-weight:700;border-bottom:1.5px solid var(--bdr);}
.ht thead th.r{text-align:right;}
.ht tbody td{padding:13px 14px;border-bottom:1px solid #F0F4FA;vertical-align:middle;}
.ht tbody td.r{text-align:right;font-variant-numeric:tabular-nums;}
.ht tbody tr:last-child td{border-bottom:none;}
.ht tbody tr{cursor:pointer;transition:background .1s;}
.ht tbody tr:hover{background:#F6F9FD;}
.h-s{font-weight:700;font-size:14px;}
.h-f{font-size:11px;color:var(--t3);margin-top:2px;}
.h-q{font-weight:700;font-variant-numeric:tabular-nums;}
.h-i{font-weight:700;font-variant-numeric:tabular-nums;}
.chips{display:flex;flex-wrap:wrap;gap:4px;}
.chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.spec-tag{font-size:9px;font-weight:800;background:#FEF3C7;color:#92400E;padding:2px 6px;border-radius:4px;margin-left:4px;vertical-align:middle;}

/* ─── STOCK DETAIL CARD ─── */
.scard{background:var(--card);border-radius:var(--r);box-shadow:var(--sh2);margin-bottom:18px;overflow:hidden;border:1.5px solid var(--bdr);}
.sc-top{padding:20px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-bottom:1.5px solid var(--bdr);}
.sc-nm{font-size:22px;font-weight:900;color:var(--t1);letter-spacing:-.6px;}
.sc-fn{font-size:12px;color:var(--t2);margin-top:4px;}
.sc-tk{font-size:11px;color:var(--acc);font-weight:700;margin-top:3px;}
.sc-tk.w{color:var(--tbd);}
.pbox{text-align:right;min-width:100px;flex-shrink:0;}
.px{font-size:23px;font-weight:900;letter-spacing:-.6px;font-variant-numeric:tabular-nums;}
.pxc{font-size:12px;font-weight:700;margin-top:3px;}
.pxc.up{color:var(--gn);}
.pxc.dn{color:var(--rd);}
.pxm{font-size:11px;color:var(--t3);line-height:1.5;}

/* ─── DETAIL STATS ─── */
.dstats{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--bdr);border-bottom:1.5px solid var(--bdr);}
.ds{background:#FAFBFF;padding:13px 20px;}
.ds-l{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-weight:700;}
.ds-v{font-size:15px;font-weight:800;color:var(--t1);margin-top:3px;font-variant-numeric:tabular-nums;}
.ds-v.up{color:var(--gn);}
.ds-v.dn{color:var(--rd);}
.ds-v.dim{color:var(--t3);}

/* ─── LOTS ─── */
.lots{padding:16px 20px;}
.lots-h{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:12px;}
.lag{border:1.5px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.lag:last-child{margin-bottom:0;}
.lag-h{background:#F8FAFD;padding:9px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;}
.abadge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px;}
.ptag{font-size:11px;color:var(--t3);font-weight:500;}
.atot{margin-left:auto;font-size:11px;color:var(--t2);font-weight:700;font-variant-numeric:tabular-nums;}
.lrow{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #EEF2F7;}
.lrow:last-child{border-bottom:none;}
.ld{font-size:11px;color:var(--t3);}
.lq{font-size:13px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums;}
.lr{font-size:11px;color:var(--t3);text-align:right;font-variant-numeric:tabular-nums;}
.li{font-size:13px;font-weight:700;text-align:right;margin-top:2px;font-variant-numeric:tabular-nums;}

/* ─── TBD STRIP ─── */
.tbd-strip{background:#FFFBEB;border-bottom:1.5px solid #FDE68A;padding:9px 20px;font-size:12px;color:var(--tbd);font-weight:600;display:flex;align-items:center;gap:6px;}

/* ─── TRADE TABLE ─── */
.trade-card{background:var(--card);border-radius:var(--ri);border:1.5px solid var(--bdr);overflow:hidden;margin-bottom:20px;}
.trade-row{display:flex;padding:13px 16px;border-bottom:1px solid var(--bdr);align-items:center;gap:12px;flex-wrap:wrap;}
.trade-row:last-child{border-bottom:none;}
.trade-row:hover{background:#F8FAFD;}
.tr-name{font-size:14px;font-weight:800;flex:1;min-width:100px;}
.tr-meta{font-size:11px;color:var(--t3);margin-top:2px;}
.tr-detail{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;}
.tr-pl{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;}
.tr-pl.up{color:var(--gn);}
.tr-pl.dn{color:var(--rd);}
.tr-pct{font-size:11px;font-weight:700;margin-top:2px;}
.tr-pct.up{color:var(--gn);}
.tr-pct.dn{color:var(--rd);}
.tr-qdeets{font-size:11px;color:var(--t3);margin-top:4px;}
.pl-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:700;}
.pl-badge.up{background:var(--gnbg);color:var(--gn);}
.pl-badge.dn{background:var(--rdbg);color:var(--rd);}

/* ─── SPEC NOTE ─── */
.spec-banner{
  background:linear-gradient(135deg,#7C3AED15,#F59E0B15);
  border:1.5px solid #F59E0B50;border-radius:var(--ri);
  padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.spec-banner-ico{font-size:20px;}
.spec-banner-text{font-size:13px;color:#92400E;font-weight:500;}
.spec-banner-text strong{color:#78350F;}

/* ─── SUMMARY ROW ─── */
.sum-row{background:#F8FAFD;border:1.5px solid var(--bdr);border-radius:var(--ri);padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.sum-item{text-align:center;}
.sum-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);}
.sum-v{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:3px;}
.sum-v.up{color:var(--gn);}
.sum-v.dn{color:var(--rd);}

/* ─── NO RESULTS ─── */
.no-res{background:var(--card);border-radius:var(--r);border:1.5px solid var(--bdr);padding:48px 20px;text-align:center;}
.nr-ic{font-size:40px;margin-bottom:10px;}
.nr-tx{color:var(--t2);font-size:15px;}

/* ─── MISC ─── */
.res-meta{font-size:12px;color:var(--t3);margin-bottom:14px;font-weight:500;}
.divider{height:1.5px;background:var(--bdr);margin:20px 0;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:rgba(255,255,255,.8);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
.spin.dark{border-color:#CBD5E0;border-top-color:var(--acc);}

/* ─── RESPONSIVE ─── */
@media(min-width:500px){
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .accts{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:680px){
  .stat-row{grid-template-columns:repeat(4,1fr);}
  .accts{grid-template-columns:repeat(4,1fr);}
  .dstats{grid-template-columns:repeat(3,1fr);}
  .nav{padding:16px 24px 0;}
  .outer{padding:0 24px 48px;}
  .wrap{padding:22px 20px;}
  .tab-bar{padding:16px 24px 0;}
}
@media(min-width:900px){
  .nav{padding:18px 40px 0;}
  .outer{padding:0 40px 60px;}
  .tab-bar{padding:16px 40px 0;}
  .dstats{grid-template-columns:repeat(5,1fr);}
  .nav-title{font-size:17px;}
}
</style>
</head>
<body>

<!-- ═══ LOCK SCREEN ═══ -->
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-logo">₹</div>
    <div class="lock-title">Mitul Parekh Portfolio</div>
    <div class="lock-sub">Enter your password to continue</div>
    <div class="lock-input-wrap">
      <input class="lock-pin" id="lockPin" type="password"
        placeholder="Password" maxlength="20"
        onkeydown="if(event.key==='Enter')unlock()"
        oninput="document.getElementById('lockErr').textContent=''">
      <button class="lock-eye" id="eyeBtn" onclick="toggleEye()" title="Show/hide">👁</button>
    </div>
    <div class="lock-err" id="lockErr"></div>
    <button class="lock-btn" onclick="unlock()">Unlock →</button>
    <div class="lock-hint">Protected · Shah Family Private</div>
  </div>
</div>

<!-- ═══ NAV ═══ -->

const lotInv = l => l.q * l.r * (1 + (l.b||0)/100);
const totQ   = h => h.lots.reduce((s,l)=>s+l.q, 0);

function tradePL(t){
  const cost  = t.q * t.br * (1 + (t.bb||0)/100);
  const proc  = t.q * t.sr * (1 - (t.sb||0)/100);
  return { cost, proc, pl: proc - cost };
}

function fmtINR(n, compact=false){
  const a=Math.abs(n), sg=n<0?'−':'';
  if(a>=10000000) return `${sg}₹${(a/10000000).toFixed(2)} Cr`;
  if(a>=100000)   return `${sg}₹${(a/100000).toFixed(2)} L`;
  if(compact && a>=1000) return `${sg}₹${(a/1000).toFixed(1)}K`;
  return `${sg}₹${a.toLocaleString('en-IN',{maximumFractionDigits:0})}`;
}
function fmtN(n){ return n.toLocaleString('en-IN'); }

  if(!s) return '—';

/* Yahoo Finance endpoints + CORS proxy fallbacks — tries each in order */
function _yUrls(ticker){
  const base1 = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`;
  const base2 = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`;
  const base3 = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(ticker)}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketPreviousClose`;
  return [
    base1,
    base2,
    `https://corsproxy.io/?${encodeURIComponent(base1)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(base2)}`,
    `https://corsproxy.io/?${encodeURIComponent(base3)}`,
  ];
}

function _parseYahoo(d){
  /* v8/chart format */
  const m = d?.chart?.result?.[0]?.meta;
  if(m?.regularMarketPrice){
    const prev = m.previousClose||m.chartPreviousClose||m.regularMarketPrice;
    return {cur:m.regularMarketPrice, prev, chg:m.regularMarketPrice-prev, pct:(m.regularMarketPrice-prev)/prev*100};
  }
  /* v7/quote format */
  const q = d?.quoteResponse?.result?.[0];
  if(q?.regularMarketPrice){
    const prev = q.regularMarketPreviousClose||q.regularMarketPrice;
    return {cur:q.regularMarketPrice, prev, chg:q.regularMarketPrice-prev, pct:q.regularMarketChangePercent||0};
  }
  return null;
}

async function _tryFetch(url, timeoutMs=7000){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), timeoutMs);
  try{
    const r = await fetch(url,{credentials:'omit',signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ clearTimeout(t); return null; }
}

async function fetchPx(ticker){
  if(!ticker) return null;
  if(_px[ticker] !== undefined) return _px[ticker];
  for(const url of _yUrls(ticker)){
    const d = await _tryFetch(url);
    if(!d) continue;
    const parsed = _parseYahoo(d);
    if(parsed){ _px[ticker]=parsed; return parsed; }
  }
  _px[ticker]=null; return null;
}

async function loadPx(h){
  const id = uid(h.s);
  const boxEl = document.getElementById('px_'+id);
  if(!boxEl) return;
  const px = await fetchPx(h.t);
  if(!boxEl.isConnected) return;
  if(px){
    const up = px.chg >= 0;
    boxEl.innerHTML = `<div class="px">${px.cur>=1000?'₹'+Math.round(px.cur).toLocaleString('en-IN'):'₹'+px.cur.toFixed(2)}</div>
<div class="pxc ${up?'up':'dn'}">${up?'▲':'▼'} ${Math.abs(px.pct).toFixed(2)}%</div>`;
    /* update P&L summary boxes */
    const tq = totQ(h), ti = totI(h), cv = px.cur*tq, pl = cv-ti, plp=(pl/ti*100);
    const ve = document.getElementById('ds_cv_'+id);
    const pe = document.getElementById('ds_pl_'+id);
    if(ve) ve.innerHTML=`<div class="ds-l">Current Value</div><div class="ds-v">${fmtINR(cv)}</div>`;
    if(pe) pe.innerHTML=`<div class="ds-l">Unrealised P&L</div><div class="ds-v ${plClass(pl)}">${fmtINR(pl)}<br><span style="font-size:12px">(${plp.toFixed(2)}%)</span></div>`;
    /* update live total */
    const prev = _px[h.t]?._prevContrib || 0;
    _liveValue += cv - prev;
    _px[h.t]._prevContrib = cv;
    _livePriced++;
    _updateUnrealStat();
  } else {
    boxEl.innerHTML = `<div class="pxm">${h.t?'Unavailable':'Ticker unknown'}</div>`;
  }
}

async function refreshAll(){
  const btn = document.getElementById('refreshBtn');
  document.getElementById('rIco').textContent='';
  document.getElementById('rTxt').textContent='Loading…';
  btn.disabled = true;
  Object.keys(_px).forEach(k=>delete _px[k]);
  _liveValue = 0; _livePriced = 0;
  // reset unreal stat
  const u = document.getElementById('stat-unreal');
  if(u) u.innerHTML=`<div class="stat-lbl">Open P&L</div><div class="stat-val"><span class="stat-loader"></span></div><div class="stat-sub">Fetching live prices…</div>`;
  const visible = HOLDINGS.filter(h=>document.getElementById('px_'+uid(h.s)));
  for(const h of visible){ await loadPx(h); await new Promise(r=>setTimeout(r,180)); }
  document.getElementById('rIco').textContent='⟳';
  document.getElementById('rTxt').textContent='Prices';
  btn.disabled = false;
}

/* ═══════════════════════════════════════
   RENDER: ACCOUNT DETAIL (filtered by account)
═══════════════════════════════════════ */
function renderAccountDetail(acct, platform){
  const c = pltC(platform);
  const relevant = HOLDINGS.map(h=>{
    const myLots = h.lots.filter(l=>l.a===acct);
    if(!myLots.length) return null;
    return {...h, myLots};
  }).filter(Boolean).sort((a,b)=>{
    const ai=a.myLots.reduce((s,l)=>s+lotInv(l),0);
    const bi=b.myLots.reduce((s,l)=>s+lotInv(l),0);
    return bi-ai;
  });
  const totalInv = relevant.reduce((s,h)=>s+h.myLots.reduce((ss,l)=>ss+lotInv(l),0),0);
  const totalQtyAll = relevant.reduce((s,h)=>s+h.myLots.reduce((ss,l)=>ss+l.q,0),0);

  return `
<div class="acct-filter-header">
  <button class="acct-filter-back" onclick="clearAccountFilter()">← All Accounts</button>
  <div class="acct-filter-info">
    <div class="acct-filter-name" style="color:${c}">${acct}</div>
    <div class="acct-filter-sub">${platform} · ${relevant.length} stocks · ${fmtN(totalQtyAll)} total shares</div>
  </div>
  <div>
    <div class="acct-filter-total" style="color:${c}">${fmtINR(totalInv)}</div>
    <div class="acct-filter-totalsub">Total Invested</div>
  </div>
</div>
<div class="tw">
<table class="ht">
<thead><tr>
<th>Company</th><th class="r">Shares in Account</th><th class="r">Avg Buy Price</th><th class="r">Invested</th>
</tr></thead>
<tbody>
${relevant.map(h=>{
  const myQ = h.myLots.reduce((s,l)=>s+l.q,0);
  const myI = h.myLots.reduce((s,l)=>s+lotInv(l),0);
  const myAvg = myI/myQ;
  const isSpec = SPEC_SCRIPTS.has(h.s);
  const multiLot = h.myLots.length > 1;
  return `<tr onclick="goDetail('${h.s}')">
<td>
  <div class="h-s">${h.s}${isSpec?'<span class="spec-tag">⚡ SPEC</span>':''}</div>
  <div class="h-f">${h.fn}</div>
  ${multiLot?`<div class="h-f" style="margin-top:4px;color:var(--acc);font-weight:600">${h.myLots.length} lots: ${h.myLots.map(l=>`${fmtN(l.q)}@₹${l.r}`).join(' + ')}</div>`:''}
</td>
<td class="r"><span class="h-q">${fmtN(myQ)}</span></td>
<td class="r" style="font-variant-numeric:tabular-nums;font-weight:600">₹${myAvg.toFixed(2)}</td>
<td class="r"><span class="h-i">${fmtINR(myI)}</span></td>
</tr>`;
}).join('')}
</tbody>
</table>
</div>
<p style="font-size:12px;color:var(--t3);margin-top:8px;text-align:center">Tap any row to see full lot breakdown → </p>`;
}

<div class="sec-h">All Holdings &nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--t3)">— tap any row for detail</span></div>
<div class="tw">
<table class="ht">
<thead><tr>
<th>Company</th><th>Accounts</th><th class="r">Shares</th><th class="r">Invested</th>

<tbody>
${sorted.map(h=>{

</tbody>
</table>

function renderSearch(q){
  const qq = q.trim().toLowerCase();
  const res = HOLDINGS.filter(h=>
    h.s.toLowerCase().includes(qq)||
    h.fn.toLowerCase().includes(qq)||
    (h.t&&h.t.toLowerCase().replace('.ns','').includes(qq))
  );
  if(!res.length) return `<div class="no-res"><div class="nr-ic">🔍</div><div class="nr-tx">No holdings found for <strong>"${q}"</strong></div></div>`;
  return `<p class="res-meta">${res.length} result${res.length>1?'s':''} found</p>${res.map(h=>renderDetail(h)).join('')}`;
}

/* ═══════════════════════════════════════
   STATE & ROUTING
═══════════════════════════════════════ */
let _tab = 'holdings';
let _q   = '';
let _filterAcct = null; // { a: account code, p: platform }

function switchTab(t){
  _tab = t;
  _filterAcct = null;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(_q) { clearQ(); return; }
  draw();
}

function draw(){
  const content = document.getElementById('content');
  if(_q && _q.trim()){
    document.getElementById('tabBar').style.opacity='0.5';
    content.innerHTML = renderSearch(_q);
    const qq = _q.trim().toLowerCase();
    HOLDINGS.filter(h=>h.s.toLowerCase().includes(qq)||h.fn.toLowerCase().includes(qq)||(h.t&&h.t.toLowerCase().replace('.ns','').includes(qq))).forEach(h=>loadPx(h));
  } else {
    document.getElementById('tabBar').style.opacity='1';
    if(_tab==='holdings')  content.innerHTML = renderHoldingsOverview();
    else if(_tab==='trades') content.innerHTML = renderTrades();
    else if(_tab==='spec') content.innerHTML = renderSpec();
  }
}

function onSearch(v){
  _q = v;
  _filterAcct = null;
  const x = document.getElementById('sqx');
  x.className = 'sqx'+(v?' on':'');
  clearTimeout(onSearch._t);
  onSearch._t = setTimeout(draw, 160);
}

function clearQ(){
  document.getElementById('sq').value='';
  document.getElementById('sqx').className='sqx';
  _q=''; _filterAcct=null; draw();
}

function goDetail(script){
  const inp = document.getElementById('sq');
  inp.value = script; onSearch(script);
  window.scrollTo({top:0,behavior:'smooth'});
}

function goHome(){
  clearQ();
  _tab='holdings'; _filterAcct=null;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-holdings').classList.add('active');
  draw();
  window.scrollTo({top:0,behavior:'smooth'});
}

function filterByAccount(a, p){
  if(_filterAcct && _filterAcct.a===a){ _filterAcct=null; }
  else { _filterAcct={a,p}; }
  draw();
  window.scrollTo({top:document.getElementById('mainWrap').offsetTop-10,behavior:'smooth'});
}

function clearAccountFilter(){
  _filterAcct=null; draw();
}

/* ═══════════════════════════════════════
   LOCK / UNLOCK
═══════════════════════════════════════ */
const PWD = '3113';
let _unlocked = false;

function unlock(){
  const pin = document.getElementById('lockPin').value;
  if(pin === PWD){
    _unlocked = true;
    const ls = document.getElementById('lockScreen');
    ls.classList.add('lock-fadeout');
    setTimeout(()=>{ ls.style.display='none'; startApp(); }, 340);
  } else {
    const inp = document.getElementById('lockPin');
    const err = document.getElementById('lockErr');
    inp.classList.remove('err');
    void inp.offsetWidth; // reflow to restart animation
    inp.classList.add('err');
    inp.value='';
    err.textContent = 'Incorrect password. Try again.';
    inp.focus();
  }
}

function toggleEye(){
  const inp = document.getElementById('lockPin');
  const btn = document.getElementById('eyeBtn');
  if(inp.type==='password'){ inp.type='text'; btn.textContent='🙈'; }
  else { inp.type='password'; btn.textContent='👁'; }
}

/* app boot — called after unlock */
function startApp(){
  document.getElementById('jsDate').textContent = UPDATED;
  document.getElementById('statsRow').innerHTML = renderStats();
  document.getElementById('tpH').textContent = HOLDINGS.length;
  document.getElementById('tpT').textContent = DELIVERY_TRADES.length;
  document.getElementById('tpS').textContent = SPEC_TRADES.length;
  draw();
  /* auto-fetch prices */
  (async()=>{
    const btn = document.getElementById('refreshBtn');
    document.getElementById('rIco').textContent='';
    document.getElementById('rTxt').textContent='Loading…';
    btn.disabled=true;
    const u=document.getElementById('stat-unreal');
    if(u) u.innerHTML=`<div class="stat-lbl">Open P&L (Live)</div><div class="stat-val"><span class="stat-loader"></span></div><div class="stat-sub">Fetching prices…</div>`;
    for(const h of HOLDINGS){
      if(!h.t) continue;
      const px = await fetchPx(h.t);
      if(px){ _liveValue+=px.cur*totQ(h); _livePriced++; _updateUnrealStat(); }
      await new Promise(r=>setTimeout(r,140));
    }
    document.getElementById('rIco').textContent='⟳';
    document.getElementById('rTxt').textContent='Prices';
    btn.disabled=false;
  })();
}

/* focus pin input on load */
window.addEventListener('load',()=>document.getElementById('lockPin').focus());
</script>
